{% extends 'base.html' %}
{% set body_class = 'setup-page' %}

{% block content %}
<div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
</div>

<div class="setup-container glass-panel">
    <div class="auth-header">
        <h2>Complete Your Profile</h2>
        <p>Please provide your details before accessing the dashboard.</p>
    </div>

    <form method="POST" class="setup-form">
        <div class="form-grid">
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            
            <div class="input-group">
                <label for="branch">Branch/Department</label>
                <select id="branch" name="branch" required>
                    <option value="" disabled selected>Select Branch</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Electrical Engineering">Electrical Engineering</option>
                    <option value="Mechanical Engineering">Mechanical Engineering</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                    <option value="Information Technology">Information Technology</option>
                </select>
            </div>

            {% if role == 'Student' %}
            <div class="input-group">
                <label for="roll_number">Roll Number</label>
                <input type="text" id="roll_number" name="roll_number" required>
            </div>
            <div class="input-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" required>
            </div>
            <div class="input-group">
                <label for="course">Course</label>
                <input type="text" id="course" name="course" required>
            </div>
            <div class="input-group">
                <label for="parent_phone">Parent's Phone</label>
                <input type="text" id="parent_phone" name="parent_phone" required>
            </div>
            {% elif role == 'Teacher' %}
            <div class="input-group">
                <label for="employee_id">Employee/Roll ID</label>
                <input type="text" id="employee_id" name="employee_id" required>
            </div>
            {% endif %}

            <div class="input-group">
                <label for="phone">Personal Phone</label>
                <input type="text" id="phone" name="phone" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mt-4">Save Profile & Continue</button>
    </form>
</div>
{% endblock %}
